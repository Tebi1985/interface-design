name: Publish Fibonacci analyzer to GitHub Pages

# El sitio de Pages está configurado en modo "Deploy from a branch" (gh-pages).
# Este workflow re-publica fibonacci-analyzer/ a esa rama en cada cambio en main.
on:
  push:
    branches: [main]
    paths:
      - "fibonacci-analyzer/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push app to gh-pages branch
        run: |
          cd fibonacci-analyzer
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish fibonacci-analyzer from ${GITHUB_SHA}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
